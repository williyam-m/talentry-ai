name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check src tests
      - name: Unit tests
        run: pytest -q
      - name: End-to-end smoke (50 candidates → top‑10 CSV)
        run: |
          python -m talentry.cli.rank \
            --candidates data/raw/sample_candidates.json \
            --out /tmp/smoke.csv --top-k 10 --quiet
          head -1 /tmp/smoke.csv
          wc -l /tmp/smoke.csv

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/talentry-space/package-lock.json
      - name: Install (no lockfile bootstrap)
        working-directory: ui/talentry-space
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: ui/talentry-space
        run: npm run build
