ai_usage_summary: |
  Claude was used as a pair-programmer for architecture brainstorming, code
  review and documentation polish. **No candidate data was ever sent to a
  hosted LLM** — the entire ranking pipeline runs offline on CPU with zero
  network calls (validated in CI).

methodology_summary: |
  Talentry AI is an explainable, evidence-weighted hybrid ranker.

  Pipeline:
    1) Rule-based JD parser → JobRequirements (role family, seniority,
       must-have/nice-to-have/disqualifier skills, location, behavioural
       priors).
    2) Per-candidate text blob (career descriptions and summary upweighted).
    3) Hybrid retrieval over the corpus: BM25 (60%) + TF-IDF cosine (40%).
    4) Six explainable scoring components: title alignment (anti-stuffer
       trajectory check), semantic fit, evidence-weighted skill score
       (endorsements × duration × proficiency × assessment), experience band,
       location, behavioural multiplier (response rate, recency, notice,
       verification). Honeypot guard subtracts up to 0.5.
    5) Hallucination-free per-row reasoning composed from real profile facts
       (career highlights, top skill cluster, concerns).

  Runs in ~90s for 100K candidates on CPU; outputs a validator-clean CSV.

declarations:
  read_submission_spec: true
